name: 문서한장 광고 테스트 APK

on:
  workflow_dispatch:
  push:
    paths:
      - 'android-app/**'
      - '.github/workflows/build-test-apk.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4
      - name: Java 17 준비
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Android SDK 준비
        uses: android-actions/setup-android@v3
      - name: Android 16 SDK 설치
        run: sdkmanager 'platforms;android-36' 'build-tools;36.0.0'
      - name: Gradle 9.4.1 준비
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.4.1'
      - name: 광고 테스트 APK 빌드
        run: gradle -p android-app clean assembleDebug
      - name: 파일 이름 정리
        run: |
          mkdir -p output
          cp android-app/app/build/outputs/apk/debug/app-debug.apk 'output/문서한장-광고테스트.apk'
      - name: APK 올리기
        uses: actions/upload-artifact@v4
        with:
          name: munseohan-admob-test
          path: output/*
          if-no-files-found: error
          retention-days: 30
