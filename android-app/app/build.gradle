plugins {
    id 'com.android.application'
}

android {
    namespace 'com.hukdda.munseohan'
    compileSdk 36

    defaultConfig {
        applicationId 'com.hukdda.munseohan'
        minSdk 26
        targetSdk 36
        versionCode 1
        versionName '0.1.0'
    }

    signingConfigs {
        release {
            storeFile file('munseohan-test.keystore')
            storePassword 'munseohan-test-2026'
            keyAlias 'munseohan'
            keyPassword 'munseohan-test-2026'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.release
            applicationIdSuffix '.debug'
            versionNameSuffix '-debug'
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.core:core:1.15.0'
}
